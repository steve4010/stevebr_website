name: Universal Hugo Build & Deploy

on:
  push:
    branches:
      - main  # Triggers the automation every time you run 'git push origin main'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Download your raw markdown files and layout templates into the cloud runner
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: true  # Automatically pulls your theme if it's a Git submodule
          fetch-depth: 0    # Pulls complete history so Hugo can generate correct modification dates

      # 2. Install the exact compiler environment needed
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true    # Keeps compatibility intact if your theme processes SASS/SCSS

      # 3. Compile the site inside the cloud container
      - name: Build Static Site Assets
        run: hugo --minify

      # Install rsync
      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      # Configure SSH
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 21098 ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      # Deploy
      - name: Deploy via rsync
        run: |
          rsync -avzr \
            --delete \
            --exclude 'error_log' \
            --dry-run \
            -e "ssh -i ~/.ssh/id_rsa -p 21098" \
            public/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/${{ secrets.SERVER_USER }}/stevebr.com      